<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay | Clone</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="bg-deepBlue">

        <div class="relative w-[1080px] mx-auto flex items-center justify-between">
            <!-- Logo -->
            <a href="#" class="cursor-pointer py-7 pr-7">
                <img src="./images/logo.svg" alt="logo" width="125px" height="30px">
            </a>

            <!-- Nav Links -->
            <ul class="flex gap-5">
                <li
                    class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Payments</a>
                    <div
                        class="absolute bottom-0 w-full h-1 bg-lightBlue hidden group-hover:block transition-all duration-200">
                    </div>
                </li>
                <li
                    class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Banking</a>
                    <div
                        class="absolute bottom-0 w-full h-1 bg-lightBlue hidden group-hover:block transition-all duration-200">
                    </div>
                </li>
                <li
                    class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Corporate Card</a>
                </li>
                <li
                    class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Pay Role</a>
                </li>
                <li
                    class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Resources</a>
                    <div
                        class="absolute bottom-0 w-full h-1 bg-lightBlue hidden group-hover:block transition-all duration-200">
                    </div>
                </li>
                <li
                    class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Support</a>
                    <div
                        class="absolute bottom-0 w-full h-1 bg-lightBlue hidden group-hover:block transition-all duration-200">
                    </div>
                </li>
                <li
                    class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Pricing</a>
                    <div
                        class="absolute bottom-0 w-full h-1 bg-lightBlue hidden group-hover:block transition-all duration-200">
                    </div>
                </li>
            </ul>

            <!-- Buttons -->
            <div class="flex gap-8">
                <img src="./images/india-flag.svg" alt="india-flag" width="28px" height="20px">
                <button class="py-3 px-5 font-mullish text-white border-lightBlue border rounded-sm text-sm font-bold">
                    Log in
                </button>
                <button
                    class="py-3 px-5 font-mullish text-lightBlue300 bg-white rounded-sm text-sm font-bold border transition-all duration-200 hover:text-lightBlue500">
                    Sign Up
                    
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
     <section
     class="relative bg-deepBlue"
     >
        <div>
            <!-- left part -->
             <div>
                <h1>
                    Power your finance,grow your business
                </h1>
                <div class="w-6 h-1 bg-green-600"></div>
                <p>
                    Accept payments from customers. Automate payouts to vendors & employees. Never run out of working capital.
                </p>
                <button>Sign Up Now</button>
             </div>
             <!-- right part -->
              <img src="./images/hero-illustration.jpg" alt="hero">
        </div>
        <!-- Shape Part -->
         <div>
            <img src="./images/hero-shape.svg" alt="hshape">
         </div>
     </section>
</body>

</html>
